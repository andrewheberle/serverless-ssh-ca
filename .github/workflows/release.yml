name: Release

on:
  release:
    types: [published]

permissions: {}

jobs:
  goreleaser-release:
    name: Build and release with GoReleaser
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      # id-token: write  # Enable for cosign: https://github.com/sigstore/cosign
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: client/go.mod
          cache: false
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
          workdir: client
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: client-dist-artifact
          path: client/dist
          retention-days: 7
  worker-build:
    runs-on: ubuntu-latest
    name: Build Worker with Wrangler
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Node
        uses: actions/setup-node@v6
      - name: Install NPM dependencies
        run: npm install
      - name: Build Worker
        run: npm run build
      - name: Upload Worker build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: worker-dist-artifact
          path: dist
          retention-days: 1
  snapcraft-release:
    runs-on: ubuntu-latest
    name: Build and release Snap
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: snapcore/action-build@v1
        id: snapcraft
      - uses: snapcore/action-publish@v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        with:
          snap: ${{ steps.snapcraft.outputs.snap }}
          release: stable
  msi-release:
    name: Package release as an MSI for Windows
    runs-on: windows-latest
    permissions:
      contents: write
    needs: goreleaser-release
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: client/go.mod
          cache: false
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: client-dist-artifact
          path: client/dist
      - name: Add WiX Toolset to path
        run: Write-Output $env:WIX | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Install go-msi
        run: go install github.com/mh-cbon/go-msi@latest
      - name: Build MSI
        run: |
          cd client
          go-msi make --arch amd64 --out "$(Join-Path $([System.Environment]::CurrentDirectory) "tmp")" --src ".\templates" --msi ".\dist\ssh-ca-client.msi" --version "$(git describe --tags)"
          Write-Output "$((Get-FileHash -Algorithm SHA256 -Path ".\dist\ssh-ca-client.msi").Hash) ssh-ca-client.msi" | Out-File -FilePath ".\dist\ssh-ca-client.msi.sha256sum"
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            client/dist/ssh-ca-client.msi
            client/dist/ssh-ca-client.msi.sha256sum
  sbom-scan:
    permissions:
      actions: read
      contents: write # required to upload to the Dependency submission API
    name: Generate SBOM for released client and Worker builds
    runs-on: ubuntu-latest
    needs:
      - goreleaser-release
      - worker-build
    steps:
      - name: Download client artifacts
        uses: actions/download-artifact@v8
        with:
          name: client-dist-artifact
          path: client/dist
      - name: Download worker artifacts
        uses: actions/download-artifact@v8
        with:
          name: worker-dist-artifact
          path: dist
      - name: Scan the client and upload dependency results
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          path: client/dist
          artifact-name: client.spdx.json
          dependency-snapshot: true
      - name: Scan the Worker and upload dependency results
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          path: dist
          artifact-name: worker.spdx.json
          dependency-snapshot: true
