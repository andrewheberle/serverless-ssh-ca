name: Release

on:
  push:
    tags:
      - 'v*'

permissions: {}

jobs:
  client:
    name: Build Client with GoReleaser
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: client/go.sum
          cache: true
      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0
      - name: Release with GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
          workdir: client
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Attest build artifacts
        uses: actions/attest@v4
        with:
          subject-checksums: ./client/dist/checksums.txt
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: client-dist-artifact
          path: client/dist
          retention-days: 1
  snapcraft:
    name: Build Client as Snap
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: snapcore/action-build@v1
        id: snapcraft
      - uses: snapcore/action-publish@v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        with:
          snap: ${{ steps.snapcraft.outputs.snap }}
          release: stable
  msi:
    name: Package as an MSI for Windows
    runs-on: windows-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    needs: client
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: client-dist-artifact
          path: client/dist
      - name: Add WiX Toolset to path
        run: Write-Output $env:WIX | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: client/go.sum
          cache: true
      - name: Build MSI
        run: |
          cd client
          go tool github.com/mh-cbon/go-msi make --arch amd64 --out "$(Join-Path $([System.Environment]::CurrentDirectory) "tmp")" --src ".\templates" --msi ".\dist\ssh-ca-client.msi" --version "$(git describe --tags)"
          Write-Output "$((Get-FileHash -Algorithm SHA256 -Path ".\dist\ssh-ca-client.msi").Hash) ssh-ca-client.msi" | Out-File -FilePath ".\dist\ssh-ca-client.msi.sha256sum"
      - name: Attest MSI
        uses: actions/attest@v4
        with:
          subject-checksums: ./client/dist/ssh-ca-client.msi.sha256sum
      - name: Upload MSI as artifact
        uses: actions/upload-artifact@v7
        with:
          name: msi-artifact
          path: client/dist/**/*.msi
          retention-days: 1
      - name: Add MSI to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            client/dist/ssh-ca-client.msi
            client/dist/ssh-ca-client.msi.sha256sum
  repo:
    name: Publish to APT repository
    runs-on: ubuntu-latest
    needs: client
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: client-dist-artifact
          path: client/dist
      - name: Import GPG key
        run: echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
      - name: Setup deb-s3
        run: |
          sudo wget -O /etc/apt/trusted.gpg.d/deb-s3-keyring.asc https://deb-s3.github.io/deb-s3/gpg.key
          echo "deb https://deb-s3.github.io/deb-s3 deb-s3 main" | sudo tee /etc/apt/sources.list.d/deb-s3.list
          sudo apt-get update
          sudo apt-get install deb-s3
      - name: Upload .deb packages to repo
        run: |
          find client/dist -name '*.deb' | xargs -I{} deb-s3 upload \
            --bucket packages \
            --s3-region auto \
            --endpoint https://${{ vars.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com \
            --access-key-id ${{ secrets.R2_ACCESS_KEY_ID }} \
            --secret-access-key ${{ secrets.R2_SECRET_ACCESS_KEY }} \
            --sign C725E94C4DAFEA05 \
            --codename stable \
            --component main \
            {}
        env:
          # R2 does not support CRC32 checksums introduced in AWS SDK
          # https://github.com/aws/aws-sdk-ruby/issues/3166
          AWS_REQUEST_CHECKSUM_CALCULATION: WHEN_REQUIRED
      - name: Upload public key to apt repo
        run: |
          gpg --armor --export C725E94C4DAFEA05 > pubkey.gpg
          aws s3 cp pubkey.gpg s3://packages/pubkey.gpg \
            --endpoint-url https://${{ vars.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com \
            --region auto
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
