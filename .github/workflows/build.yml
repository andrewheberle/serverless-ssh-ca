name: Build

on:
  push:
    branches:
      - 'main'
  pull_request:

permissions: {}

jobs:
  client:
    name: Build Client with GoReleaser
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: client/go.sum
          cache: true
      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0
      - name: Build snapshot with GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: build --clean --snapshot
          workdir: client
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: client-dist-artifact
          path: client/dist
          retention-days: 1
  worker:
    name: Build Worker with Wrangler
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Set up Node
        uses: actions/setup-node@v6
      - name: Install NPM dependencies
        run: npm install
      - name: Build Worker
        run: npm run build
  snapcraft:
    name: Build Client as Snap
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: snapcore/action-build@v1
        id: snapcraft
      - uses: snapcore/action-publish@v1
        if: github.event_name == 'push'
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        with:
          snap: ${{ steps.snapcraft.outputs.snap }}
          release: edge
  msi:
    name: Package as an MSI for Windows
    runs-on: windows-latest
    needs: client
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: client-dist-artifact
          path: client/dist
      - name: Add WiX Toolset to path
        run: Write-Output $env:WIX | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: client/go.sum
          cache: true
      - name: Build MSI
        run: |
          cd client
          go tool github.com/mh-cbon/go-msi make --arch amd64 --out "$(Join-Path $([System.Environment]::CurrentDirectory) "tmp")" --src ".\templates" --msi ".\dist\ssh-ca-client.msi" --version "$(git describe --tags)"
          Write-Output "$((Get-FileHash -Algorithm SHA256 -Path ".\dist\ssh-ca-client.msi").Hash) ssh-ca-client.msi" | Out-File -FilePath ".\dist\ssh-ca-client.msi.sha256sum"
      - name: Upload MSI as artifact
        uses: actions/upload-artifact@v7
        with:
          name: msi-artifact
          path: client/dist/**/*.msi
          retention-days: 1
