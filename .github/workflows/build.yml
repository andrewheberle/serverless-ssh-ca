name: Build

on:
  push:
    branches:
      - 'main'
    tags:
      - 'v*'
  pull_request:

permissions: {}

jobs:
  client:
    name: Build Client with GoReleaser
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: client/go.mod
          cache: true
      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0
      - name: Build snapshot with GoReleaser
        uses: goreleaser/goreleaser-action@v7
        if: ${{ ! startsWith(github.ref, 'refs/tags/') }}
        with:
          distribution: goreleaser
          version: "~> v2"
          args: build --clean --snapshot
          workdir: client
      - name: Release with GoReleaser
        uses: goreleaser/goreleaser-action@v7
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
          workdir: client
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Sign artifacts
        uses: actions/attest@v4
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        with:
          subject-checksums: ./client/dist/checksums.txt
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: client-dist-artifact
          path: client/dist
          retention-days: 1
  worker:
    name: Build Worker with Wrangler
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Set up Node
        uses: actions/setup-node@v6
      - name: Install NPM dependencies
        run: npm install
      - name: Build Worker
        run: npm run build
  snapcraft:
    name: Build Client as Snap
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: snapcore/action-build@v1
        id: snapcraft
      - uses: snapcore/action-publish@v1
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        with:
          snap: ${{ steps.snapcraft.outputs.snap }}
          release: edge
      - uses: snapcore/action-publish@v1
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        with:
          snap: ${{ steps.snapcraft.outputs.snap }}
          release: stable
  msi:
    name: Package as an MSI for Windows
    runs-on: windows-latest
    needs: client
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: client/go.mod
          cache: false
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: client-dist-artifact
          path: client/dist
      - name: Add WiX Toolset to path
        run: Write-Output $env:WIX | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Install go-msi
        run: go install github.com/mh-cbon/go-msi@latest
      - name: Build MSI
        run: |
          cd client
          go-msi make --arch amd64 --out "$(Join-Path $([System.Environment]::CurrentDirectory) "tmp")" --src ".\templates" --msi ".\dist\ssh-ca-client.msi" --version "$(git describe --tags)"
          Write-Output "$((Get-FileHash -Algorithm SHA256 -Path ".\dist\ssh-ca-client.msi").Hash) ssh-ca-client.msi" | Out-File -FilePath ".\dist\ssh-ca-client.msi.sha256sum"
      - name: Upload MSI as artifact
        uses: actions/upload-artifact@v7
        with:
          name: msi-artifact
          path: client/dist/**/*.msi
          retention-days: 1
      - name: Add MSI to Release
        uses: softprops/action-gh-release@v2
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        with:
          files: |
            client/dist/ssh-ca-client.msi
            client/dist/ssh-ca-client.msi.sha256sum
