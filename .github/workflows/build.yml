name: Build

on:
  push:
    branches:
      - 'main'
  pull_request:

permissions: {}

jobs:
  client:
    name: Build Client with GoReleaser
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable
          cache-dependency-path: client/go.sum
          cache: true
      - name: Generate code with go generate
        run: |
          go generate ./...
          git diff --exit-code || (echo "Generated code is out of date. Please run 'go generate ./...' and commit the changes." && exit 1)
        working-directory: ./client
      - name: Install Syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
      - name: Install Snapcraft
        uses: samuelmeuli/action-snapcraft@fceeb3c308e76f3487e72ef608618de625fb7fe8 # v3.0.1
      - name: Build snapshot with GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --snapshot --skip sign
          workdir: client
      - name: Upload build artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: client-dist-artifact
          path: client/dist
          retention-days: 1
  worker:
    name: Build Worker with Wrangler
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      - name: Install NPM dependencies
        run: npm install
      - name: Build Worker
        run: npm run build
  snapcraft:
    name: Publish Snap
    runs-on: ubuntu-latest
    needs: client
    if: ${{ github.event_name == 'push' }}
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: client-dist-artifact
          path: client/dist
      - name: Install Snapcraft and Log In
        uses: samuelmeuli/action-snapcraft@fceeb3c308e76f3487e72ef608618de625fb7fe8 # v3.0.1
      - name: Upload to Snap Store
        run: find client/dist -name *.snap -exec snapcraft upload {} --release=edge \;
        env:
          TERM: dumb
    env:
      SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}

  msi:
    name: Package as an MSI for Windows
    runs-on: windows-latest
    needs: client
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: client-dist-artifact
          path: client/dist
      - name: Add WiX Toolset to path
        run: Write-Output $env:WIX | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable
          cache-dependency-path: client/go.sum
          cache: true
      - name: Build MSI
        run: |
          cd client
          go tool go-msi make --arch amd64 --out "$(Join-Path $([System.Environment]::CurrentDirectory) "tmp")" --src ".\templates" --msi ".\dist\ssh-ca-client_$(git describe --tags)_amd64.msi" --version "$(git describe --tags)"
          Write-Output "$((Get-FileHash -Algorithm SHA256 -Path ".\dist\ssh-ca-client_$(git describe --tags)_amd64.msi").Hash) ssh-ca-client_$(git describe --tags)_amd64.msi" | Out-File -FilePath ".\dist\ssh-ca-client.sha256sum"
      - name: Upload MSI as artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: msi-artifact
          path: client/dist/**/*.msi
          retention-days: 1
